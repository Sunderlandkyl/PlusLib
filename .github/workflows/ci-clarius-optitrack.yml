name: Build Plus Package

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        type: choice
        options:
          - x64
          - Win32
      archive-name:
        description: 'Output archive name (e.g. PlusApp-Win64-Optitrack-303)'
        required: true
        default: 'PlusApp-Win64-Custom'
      package-edition:
        description: 'PLUSAPP_PACKAGE_EDITION (leave blank to omit)'
        required: false
        default: ''
      buildname-postfix:
        description: 'PLUSBUILD_BUILDNAME_POSTFIX'
        required: false
        default: 'gh-package'
      extra-config:
        description: 'Additional -DFLAG=VALUE arguments (one per line or space-separated)'
        required: false
        default: ''
      pluslib-repository:
        description: 'Git repository URL for PlusLib (defaults to current repo)'
        required: false
        default: 'https://github.com/PlusLib/PlusLib.git'
      pluslib-tag:
        description: 'Git tag or commit SHA for PlusLib (defaults to current commit)'
        required: false
        default: 'master'

jobs:

  ########
  # BUILD AND CACHE VTK
  update_vtk_x64:
    if: ${{ inputs.platform == 'x64' }}
    uses: ./.github/workflows/build-vtk.yml
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]
        build_type: [Release]
        arch: [x64]
    with:
      vtk-hash: 6b6b89ee577e6c6a5ee6f5220b9c6a12513c30b4 # v9.4.1
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      build-type: ${{ matrix.build_type }}

  update_vtk_Win32:
    if: ${{ inputs.platform == 'Win32' }}
    uses: ./.github/workflows/build-vtk.yml
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]
        build_type: [Release]
        arch: [Win32]
    with:
      vtk-hash: 6b6b89ee577e6c6a5ee6f5220b9c6a12513c30b4 # v9.4.1
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      build-type: ${{ matrix.build_type }}

  ########
  # BUILD AND CACHE ITK
  update_itk_x64:
    if: ${{ inputs.platform == 'x64' }}
    uses: ./.github/workflows/build-itk.yml
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]
        build_type: [Release]
        arch: [x64]
    with:
      itk-hash: f98d5fac5e1d5ef694f3010f12bbbc2c792994c6 # v5.4.4
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      build-type: ${{ matrix.build_type }}

  update_itk_Win32:
    if: ${{ inputs.platform == 'Win32' }}
    uses: ./.github/workflows/build-itk.yml
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]
        build_type: [Release]
        arch: [Win32]
    with:
      itk-hash: f98d5fac5e1d5ef694f3010f12bbbc2c792994c6 # v5.4.4
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      build-type: ${{ matrix.build_type }}

  ########
  # RESOLVE OUTPUTS FROM WHICHEVER PLATFORM JOBS RAN
  resolve_deps:
    needs: [update_vtk_x64, update_vtk_Win32, update_itk_x64, update_itk_Win32]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    outputs:
      vtk-cache-key: ${{ inputs.platform == 'x64' && needs.update_vtk_x64.outputs.cache-key || needs.update_vtk_Win32.outputs.cache-key }}
      itk-cache-key: ${{ inputs.platform == 'x64' && needs.update_itk_x64.outputs.cache-key || needs.update_itk_Win32.outputs.cache-key }}
      vtk-install-path: ${{ inputs.platform == 'x64' && needs.update_vtk_x64.outputs.install-path || needs.update_vtk_Win32.outputs.install-path }}
      itk-install-path: ${{ inputs.platform == 'x64' && needs.update_itk_x64.outputs.install-path || needs.update_itk_Win32.outputs.install-path }}
    steps:
      - run: echo "Resolved deps for platform ${{ inputs.platform }}"

  ########
  # BUILD PLUS PACKAGE
  build_plus_package:
    needs: [resolve_deps]
    uses: ./.github/workflows/build-plus.yml
    secrets:
      pltools-access-token: ${{ secrets.PLTOOLS_ACCESS_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]
        build_type: [Release]
    with:
      arch: ${{ inputs.platform }}
      os: ${{ matrix.os }}
      pluslib-repository: ${{ inputs.pluslib-repository }}
      pluslib-tag: ${{ inputs.pluslib-tag }}
      vtk-cache-key: ${{ needs.resolve_deps.outputs.vtk-cache-key }}
      itk-cache-key: ${{ needs.resolve_deps.outputs.itk-cache-key }}
      archive-name: ${{ inputs.archive-name }}
      plus-config: >-
        -DVTK_DIR=${{ needs.resolve_deps.outputs.vtk-install-path }}
        -DITK_DIR=${{ needs.resolve_deps.outputs.itk-install-path }}
        -DPLUSBUILD_BUILDNAME_POSTFIX=${{ inputs.buildname-postfix }}
        ${{ inputs.package-edition != '' && format('-DPLUSAPP_PACKAGE_EDITION:STRING="{0}"', inputs.package-edition) || '' }}
        ${{ inputs.extra-config }}
